services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      MONGODB_URI: mongodb://mongo:27017/careerdock
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: replace-with-a-long-random-secret
    depends_on:
      - mongo

volumes:
  mongo_data:
